<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷達找顏色遊戲</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        #game-container {
            display: grid;
            gap: 2px;
            border: 4px solid #34495e;
            background-color: #000; /* 背景改為黑色，強調雷達感 */
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            position: relative; /* 確保雷達圈圈定位基準 */
            overflow: hidden; /* 防止圈圈超出邊界 */
        }

        .color-cell {
            width: 55px; /* 加大方塊 */
            height: 55px;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.1s ease-in-out, opacity 0.15s;
            opacity: 0; /* 預設完全隱藏 */
        }

        .color-cell:hover {
            transform: scale(1.05);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        #message {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #555;
        }

        #status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            align-items: center;
        }

        #timer, #score-board {
            font-size: 1.5em;
            font-weight: bold;
        }

        #timer {
            color: #e74c3c;
        }

        #score-board {
            color: #2ecc71;
        }

        #reset-button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        #hint-button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
            margin-left: 10px;
        }

        #difficulty-select {
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }

        #reset-button:hover, #hint-button:hover {
            background-color: #0056b3;
        }

        #hint-button:hover {
            background-color: #5a6268;
        }

        .correct {
            border: 3px solid green !important;
            box-shadow: 0 0 10px green;
        }
        .incorrect {
            border: 3px solid red !important;
            box-shadow: 0 0 10px red;
        }

        .hint-highlight {
            outline: 4px solid yellow;
            z-index: 10;
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
        }

        /* 彩帶粒子樣式 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 1000;
            pointer-events: none;
        }

        /* 成功與失敗動畫關鍵影格 */
        @keyframes success-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px #2ecc71; }
            50% { transform: scale(1.3); box-shadow: 0 0 30px #2ecc71; }
            100% { transform: scale(1); box-shadow: 0 0 10px #2ecc71; }
        }

        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        @keyframes text-flash {
            0%, 100% { color: inherit; }
            50% { color: #ff0000; transform: scale(1.1); }
        }

        .success-anim {
            animation: success-pulse 0.6s ease-out;
            z-index: 10;
        }

        .shake-anim {
            animation: error-shake 0.4s ease-in-out;
        }

        .flash-anim {
            animation: text-flash 0.5s ease-in-out 2;
        }

        /* 雷達掃描圓圈樣式 */
        #radar-scan-circle {
            position: absolute;
            width: 160px; /* 掃描半徑縮小為 80px * 2 */
            height: 160px;
            border: 2px solid rgba(46, 204, 113, 0.4);
            border-radius: 50%;
            pointer-events: none; /* 讓點擊穿透圓圈，不影響點選方塊 */
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(46, 204, 113, 0.15) 0%, rgba(46, 204, 113, 0) 70%);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
            z-index: 100;
            display: none;
        }

        /* 遊戲結束顯示全部 */
        .reveal-all .color-cell {
            opacity: 1 !important;
        }

        /* 隱藏元素用的類別 */
        .hidden {
            display: none !important;
        }

        /* 開始畫面樣式 */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(240, 242, 245, 0.98);
            z-index: 1000;
        }

        #start-screen .start-box {
            background-color: white;
            padding: 30px 30px 40px;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
            text-align: left;
            max-width: 520px;
            width: calc(100% - 40px);
        }

        #start-screen h2 {
            font-size: 2.2em;
            margin-bottom: 15px;
            color: #2ecc71;
            text-align: center;
        }

        #start-screen h3 {
            margin-top: 20px;
            font-size: 1.2em;
            color: #34495e;
        }

        #start-screen p {
            color: #555;
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        #start-screen ul {
            list-style: disc inside;
            line-height: 1.8;
            margin: 20px 0;
        }

        #start-screen button {
            display: block;
            margin: 0 auto;
        }

        /* 結算畫面樣式 */
        #result-screen {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 300px;
            z-index: 2000;
        }

        #result-screen h2 {
            font-size: 2.5em;
            margin-top: 0;
        }

        #result-message {
            font-size: 1.2em;
            margin: 10px 0 20px;
            color: #555;
        }

        .final-score {
            font-size: 3em;
            color: #2ecc71;
            margin: 20px 0;
        }

        .result-success {
            border: 4px solid #2ecc71;
            background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(46,204,113,0.05));
        }

        .result-failure {
            border: 4px solid #e74c3c;
            background: linear-gradient(135deg, rgba(231,76,60,0.15), rgba(231,76,60,0.05));
        }

        #start-screen ul {
            text-align: left;
            line-height: 1.8;
            margin: 20px 0;
        }

        #start-game-btn, #restart-game-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #start-game-btn:hover, #restart-game-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>雷達找顏色遊戲</h1>

    <!-- 遊戲開始畫面 -->
    <div id="start-screen">
        <div class="start-box">
            <h2>📡 雷達找顏色</h2>
            <p>在限定時間內，用滑鼠掃描找出唯一與眾不同的色塊。每次答對可以繼續出題，錯了也不會立刻結束，直到時間耗盡再看結果。</p>
            <h3>遊戲規則</h3>
            <ul>
                <li><b>雷達掃描：</b>滑鼠移動時方塊會逐漸顯示顏色。</li>
                <li><b>連續答對：</b>Combo 會讓你獲得更高分。</li>
                <li><b>錯誤不罰退場：</b>點錯後會重置 Combo，但還能繼續答題。</li>
                <li><b>時間結束：</b>時間到後會顯示你的成績與勝敗畫面。</li>
            </ul>
            <button id="start-game-btn">開始遊戲</button>
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="result-screen" class="hidden">
        <h2 id="result-title">時間到！</h2>
        <p id="result-message">你的遊戲結果會顯示在這裡。</p>
        <div class="final-score" id="final-score-val">0</div>
        <button id="restart-game-btn">再來一次</button>
    </div>

    <!-- 遊戲主體 UI (初始隱藏) -->
    <div id="status-bar" class="hidden">
        <div id="timer">剩餘時間: --s</div>
        <div id="score-board">分數: 0 | Combo: 0</div>
    </div>
    <div id="game-container" class="hidden"></div>
    <p id="message" class="hidden">點擊「重新開始」來開始遊戲！</p>
    <div id="controls" class="hidden">
        <select id="difficulty-select">
            <option value="easy">簡單 (5x5)</option>
            <option value="normal" selected>一般 (10x10)</option>
            <option value="hard">困難 (16x16)</option>
        </select>
        <button id="reset-button">重新開始</button>
        <button id="hint-button">提示</button>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const messageElement = document.getElementById('message');
        const timerElement = document.getElementById('timer');
        const scoreElement = document.getElementById('score-board');
        const resetButton = document.getElementById('reset-button');
        const hintButton = document.getElementById('hint-button');
        const difficultySelect = document.getElementById('difficulty-select');
        const startScreen = document.getElementById('start-screen');
        const startGameBtn = document.getElementById('start-game-btn');
        const resultScreen = document.getElementById('result-screen');
        const restartGameBtn = document.getElementById('restart-game-btn');

        // 難度設定：size 為邊長，variance 為顏色差異，time 為限制秒數
        const settings = {
            easy: { size: 5, variance: 50, time: 15 },
            normal: { size: 10, variance: 25, time: 20 },
            hard: { size: 16, variance: 10, time: 30 }
        };

        let targetColor = '';
        let targetCellIndex = -1;
        let gameActive = false;
        let timeLeft = 0;
        let timerInterval = null;
        let score = 0;
        let combo = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let nextRoundTimeout = null;

        // 輔助函數：將十六進制顏色轉換為 RGB
        function hexToRgb(hex) {
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            return { r, g, b };
        }

        // 輔助函數：將 RGB 顏色轉換為十六進制
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        // 生成一個隨機的十六進制顏色
        function generateRandomHexColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return rgbToHex(r, g, b);
        }

        // 生成一個與基礎顏色略有不同的顏色
        function generateSlightlyDifferentColor(baseHexColor, variance) {
            let { r, g, b } = hexToRgb(baseHexColor);

            // 對每個顏色分量應用一個小的隨機差異
            r = Math.max(0, Math.min(255, r + Math.floor(Math.random() * (2 * variance + 1)) - variance));
            g = Math.max(0, Math.min(255, g + Math.floor(Math.random() * (2 * variance + 1)) - variance));
            b = Math.max(0, Math.min(255, b + Math.floor(Math.random() * (2 * variance + 1)) - variance));

            return rgbToHex(r, g, b);
        }

        function colorDistance(hexA, hexB) {
            const a = hexToRgb(hexA);
            const b = hexToRgb(hexB);
            const dr = a.r - b.r;
            const dg = a.g - b.g;
            const db = a.b - b.b;
            return Math.sqrt(dr * dr + dg * dg + db * db);
        }

        function clampColor(value) {
            return Math.max(0, Math.min(255, value));
        }

        // 生成一個確保具有顯著下限差異的顏色 (用於目標色塊)
        function generateDistinctColor(baseHexColor, minDiff) {
            const origin = hexToRgb(baseHexColor);
            let targetColor = baseHexColor;

            for (let attempt = 0; attempt < 50; attempt++) {
                let r = origin.r;
                let g = origin.g;
                let b = origin.b;

                // 選擇 2~3 個通道做明顯偏移
                const shiftChannels = Math.random() < 0.35 ? [0, 1, 2] : [Math.floor(Math.random() * 3), (Math.floor(Math.random() * 3) + 1) % 3];
                shiftChannels.forEach(channel => {
                    const direction = [r, g, b][channel] > 128 ? -1 : 1;
                    const offset = minDiff + Math.floor(Math.random() * 40);
                    if (channel === 0) r = clampColor(r + direction * offset);
                    if (channel === 1) g = clampColor(g + direction * offset);
                    if (channel === 2) b = clampColor(b + direction * offset);
                });

                targetColor = rgbToHex(r, g, b);
                if (colorDistance(baseHexColor, targetColor) >= minDiff) {
                    return targetColor;
                }
            }

            return targetColor;
        }

        // 更新分數與 Combo 顯示
        function updateScoreDisplay() {
            scoreElement.textContent = `分數: ${score} | Combo: ${combo}`;
        }

        // 更新計時器顯示
        function updateTimerDisplay() {
            timerElement.textContent = `剩餘時間: ${timeLeft}s`;
            if (timeLeft <= 5) {
                timerElement.style.color = '#e74c3c'; // 倒數警告色
            } else {
                timerElement.style.color = '#333';
            }
        }

        // 開始倒數計時
        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                    timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 灑彩帶特效
        function createConfetti() {
            const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#2ecc71'];
            const countPerSide = 40; // 稍微增加數量讓視覺更豐富
            const sides = [window.innerWidth * 0.05, window.innerWidth * 0.95]; // 起始點往內縮 5%

            sides.forEach(startX => {
                for (let i = 0; i < countPerSide; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    document.body.appendChild(confetti);

                    // 物理運動起點：從螢幕底部的左右兩側爆發
                    let x = startX;
                    let y = window.innerHeight;
                    
                    // 物理參數設定
                    // 減小水平速度 vx，使噴發範圍控制在 1/2 左右
                    let vx = (startX < window.innerWidth / 2 ? Math.random() * 8 + 2 : (Math.random() * 8 + 2) * -1);
                    let vy = Math.random() * -22 - 12;   // 稍微降低噴發高度，讓曲線更自然
                    let gravity = 0.6;                  // 重力強度
                    let friction = 0.98;               // 模擬空氣阻力 (讓速度隨時間減慢)
                    let rotation = Math.random() * 360;
                    let spin = (Math.random() - 0.5) * 20; // 旋轉速度
                    let opacity = 1;

                    // 隨機造型尺寸
                    confetti.style.width = Math.random() * 8 + 6 + 'px';
                    confetti.style.height = Math.random() * 8 + 6 + 'px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.top = '0px';
                    confetti.style.left = '0px';
                    confetti.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;

                    function update() {
                        // 核心物理計算
                        vx *= friction;
                        vy *= friction;
                        vy += gravity; // 套用重力
                        x += vx;
                        y += vy;
                        rotation += spin;
                        opacity -= 0.007; // 隨時間淡出

                        // 更新 DOM 座標 (使用 translate 效能優於 top/left)
                        confetti.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
                        confetti.style.opacity = opacity;

                        // 粒子生命週期檢查：當完全透明或掉出有效範圍時移除
                        if (opacity > 0 && y > -100 && x >= -100 && x <= window.innerWidth + 100) {
                            requestAnimationFrame(update);
                        } else {
                            confetti.remove();
                        }
                    }
                    
                    requestAnimationFrame(update);
                }
            });
        }

        // 出題邏輯 (不重置分數與計時)
        function startNextRound() {
            if (!gameActive) return;
            clearTimeout(nextRoundTimeout);
            
            const level = difficultySelect.value;
            const { size, variance } = settings[level];

            gameContainer.innerHTML = ''; // 清空之前的網格
            gameContainer.classList.remove('reveal-all');
            
            // 生成本局的基準背景色
            const baseColor = generateRandomHexColor();
            
            // 重新加入雷達掃描圈圈
            const scanCircle = document.createElement('div');
            scanCircle.id = 'radar-scan-circle';
            gameContainer.appendChild(scanCircle);

            gameContainer.style.gridTemplateColumns = `repeat(${size}, 55px)`;
            gameContainer.style.gridTemplateRows = `repeat(${size}, 55px)`;

            messageElement.textContent = '找出與眾不同的顏色！';
            updateScoreDisplay();

            // 目標顏色：使用新算法確保至少有 60~100 的色彩跳躍，讓它在雷達掃描下能被立即辨認
            targetColor = generateDistinctColor(baseColor, variance + 50);
            targetCellIndex = Math.floor(Math.random() * (size * size)); // 隨機選擇目標單元格

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.classList.add('color-cell');

                let cellColor;
                if (i === targetCellIndex) {
                    cellColor = targetColor;
                } else {
                    // 其餘色塊：與基準色保持高度相近 (僅 3 階變異)
                    cellColor = generateSlightlyDifferentColor(baseColor, 3);
                }
                cell.style.backgroundColor = cellColor;
                cell.dataset.color = cellColor; // 儲存顏色值以便檢查
                cell.dataset.index = i; // 儲存索引

                cell.addEventListener('click', handleCellClick);
                gameContainer.appendChild(cell);
            }
        }

        // 初始化全新遊戲 (重置所有數據)
        function initGame() {
            score = 0;
            combo = 0;
            correctCount = 0;
            wrongCount = 0;
            gameActive = true;
            const level = difficultySelect.value;
            timeLeft = settings[level].time;
            
            resultScreen.classList.add('hidden');
            resultScreen.classList.remove('result-success', 'result-failure');
            document.getElementById('status-bar').classList.remove('hidden');
            gameContainer.classList.remove('hidden');
            messageElement.classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');

            updateScoreDisplay();
            startTimer();
            startNextRound();
        }

        // 處理單元格點擊事件
        function handleCellClick(event) {
            if (!gameActive) return;

            const clickedCell = event.target;
            const clickedColor = clickedCell.dataset.color;
            const clickedIndex = parseInt(clickedCell.dataset.index);

            if (clickedIndex === targetCellIndex) {
                clickedCell.classList.add('correct', 'success-anim');
                combo++;
                correctCount++;
                score += (combo > 1) ? 15 : 10; // 第一題10分，連續對15分
                updateScoreDisplay();
                createConfetti();
                messageElement.textContent = '讚！找到正確顏色，繼續下一題！';
                nextRoundTimeout = setTimeout(startNextRound, 500);
            } else {
                messageElement.textContent = '錯了，Combo 中斷，但時間還沒結束，繼續下一題。';
                messageElement.classList.add('flash-anim');
                gameContainer.classList.add('shake-anim');
                combo = 0;
                wrongCount++;
                updateScoreDisplay();
                clickedCell.classList.add('incorrect');
                setTimeout(() => {
                    clickedCell.classList.remove('incorrect');
                    gameContainer.classList.remove('shake-anim');
                    messageElement.classList.remove('flash-anim');
                    startNextRound();
                }, 500);
            }
        }

        // 統一處理遊戲結束
        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(nextRoundTimeout);
            
            // 隱藏雷達圈圈並顯示所有方塊
            const scanCircle = document.getElementById('radar-scan-circle');
            if (scanCircle) scanCircle.style.display = 'none';
            gameContainer.classList.add('reveal-all');

            // 隱藏遊戲介面
            document.getElementById('status-bar').classList.add('hidden');
            gameContainer.classList.add('hidden');
            messageElement.classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');

            // 顯示結算視窗
            resultScreen.classList.remove('hidden');
            resultScreen.classList.remove('result-success', 'result-failure');
            document.getElementById('final-score-val').textContent = score;
            const resultTitle = document.getElementById('result-title');
            const resultMessage = document.getElementById('result-message');

            const isWin = correctCount >= wrongCount && correctCount > 0;
            if (isWin) {
                resultScreen.classList.add('result-success');
                resultTitle.textContent = '太棒了！你是顏色大師！🎉';
                resultTitle.style.color = '#2ecc71';
                resultMessage.textContent = `成功 ${correctCount} 題，繼續挑戰更高分吧！`;
                createConfetti();
            } else {
                resultScreen.classList.add('result-failure');
                resultTitle.textContent = '時間到了，還可以再試一次！💪';
                resultTitle.style.color = '#e74c3c';
                resultMessage.textContent = `你答對 ${correctCount} 題，錯了 ${wrongCount} 題。下次再來衝高分！`;
            }
        }

        // 提示功能：短暫顯示目標顏色
        function showHint() {
            if (!gameActive) return;

            const cells = document.querySelectorAll('.color-cell');
            const targetCell = cells[targetCellIndex];

            targetCell.classList.add('hint-highlight');
            setTimeout(() => {
                targetCell.classList.remove('hint-highlight');
            }, 1000); // 顯示 1 秒
        }

        // 雷達探索邏輯：計算滑鼠與方塊的距離
        gameContainer.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            
            const rect = gameContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 更新雷達圈圈位置與顯示
            const scanCircle = document.getElementById('radar-scan-circle');
            if (scanCircle) {
                scanCircle.style.display = 'block';
                scanCircle.style.left = `${mouseX}px`;
                scanCircle.style.top = `${mouseY}px`;
            }
            
            const cells = document.querySelectorAll('.color-cell');
            cells.forEach(cell => {
                const cellX = cell.offsetLeft + cell.offsetWidth / 2;
                const cellY = cell.offsetTop + cell.offsetHeight / 2;
                const distance = Math.sqrt(Math.pow(mouseX - cellX, 2) + Math.pow(mouseY - cellY, 2));
                
                // 雷達掃描半徑縮小為 80px
                const maxRange = 80;
                if (distance < maxRange) {
                    // 越近越清晰
                    cell.style.opacity = 1 - (distance / maxRange);
                } else {
                    cell.style.opacity = 0;
                }
            });
        });

        // 當滑鼠離開遊戲容器時隱藏雷達圈
        gameContainer.addEventListener('mouseleave', () => {
            const scanCircle = document.getElementById('radar-scan-circle');
            if (scanCircle) scanCircle.style.display = 'none';
            
            if (gameActive) {
                const cells = document.querySelectorAll('.color-cell');
                cells.forEach(cell => cell.style.opacity = 0);
            }
        });

        // 開始遊戲（處理 UI 切換）
        function startGame() {
            startScreen.classList.add('hidden');
            initGame();
        }

        // 綁定重新開始按鈕事件
        resetButton.addEventListener('click', initGame);
        restartGameBtn.addEventListener('click', initGame);
        hintButton.addEventListener('click', showHint);
        difficultySelect.addEventListener('change', initGame); 

        // 綁定開始按鈕
        startGameBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
